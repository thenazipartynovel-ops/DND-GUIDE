<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#171423" />
  <meta name="description" content="D&D Campaign Dashboard — The War Table v6.0" />

  <!-- Prevent flash of unstyled content -->
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #171423;
      min-height: 100%;
      overflow-x: hidden;
    }
    #root { min-height: 100vh; }
  </style>

  <title>⚔️ The War Table — D&D Dashboard</title>

  <!-- React 18 + ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone — transpiles JSX in-browser -->
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    type="text/babel" tells Babel Standalone to transpile this file.
    The App.jsx file uses global React / ReactDOM (no imports/exports)
    and self-mounts into #root at the bottom of the file.
  -->
  <script type="text/babel" src="App.jsx" data-presets="react"></script>
</body>
</html>
